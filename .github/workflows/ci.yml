name: CI Pipeline

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.0.29
        env:
          MYSQL_ROOT_PASSWORD: tempdbpassword
          MYSQL_DATABASE: pizza
        ports:
          - "3306:3306"
        options: >-
          --health-cmd "mysqladmin ping -ptempdbpassword"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    # Set version output for downstream jobs
    outputs:
      version: ${{ steps.set_version.outputs.version }}
    steps:
      - name: Verify required secrets are present
        shell: bash
        run: |
          missing=0

          check_secret () {
            name="$1"
            value="$2"
            if [ -z "$value" ]; then
              echo "::error::Missing required secret: $name"
              missing=1
            else
              echo "Secret $name is present"
            fi
          }

          check_secret "FACTORY_API_KEY" "${{ secrets.FACTORY_API_KEY }}"
          check_secret "JWT_SECRET" "${{ secrets.JWT_SECRET }}"
          check_secret "NET_ID" "${{ secrets.NET_ID }}"

          if [ "$missing" -eq 1 ]; then
            echo "One or more required secrets are missing"
            exit 1
          fi

      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22.x"

      - name: Install dependencies
        run: npm ci

      - name: Run Linter
        run: npm run lint

      - name: Test database connection
        run: |
          echo "Testing MySQL connection..."
          npm install -g wait-port
          wait-port 127.0.0.1:3306 -t 30000

          # Test connection with Node.js
          node -e "
          const mysql = require('mysql2/promise');
          (async () => {
            try {
              const connection = await mysql.createConnection({
                host: '127.0.0.1',
                user: 'root',
                password: 'tempdbpassword',
                database: 'pizza',
                connectTimeout: 60000
              });
              console.log('✓ Successfully connected to MySQL database');
              await connection.end();
              process.exit(0);
            } catch (error) {
              console.error('✗ Failed to connect to MySQL:', error.message);
              process.exit(1);
            }
          })();
          "

      - name: Write config file
        run: |
          echo "module.exports = {
            jwtSecret: '${{ secrets.JWT_SECRET }}',
            db: {
              connection: {
                host: '127.0.0.1',
                user: 'root',
                password: 'tempdbpassword',
                database: 'pizza',
                connectTimeout: 60000,
              },
              listPerPage: 10,
            },
            factory: {
              url: 'https://pizza-factory.cs329.click',
              apiKey: '${{ secrets.FACTORY_API_KEY }}',
            },
            metrics: {
              source: '${{ secrets.METRICS_SOURCE || 'jwt-pizza-service-dev' }}',
              endpointUrl: '${{ secrets.METRICS_ENDPOINT_URL }}',
              accountId: '${{ secrets.METRICS_ACCOUNT_ID }}',
              apiKey: '${{ secrets.METRICS_API_KEY }}',
            },
          };" > src/config.js

      - name: Run tests
        run: npm test

      - name: Set version
        id: set_version
        run: |
          version=$(date +'%Y%m%d.%H%M%S')
          echo "version=$version" >> "$GITHUB_OUTPUT"
          printf '{"version": "%s" }' "$version" > src/version.json

      - name: Update coverage
        run: |
          coverage=$(jq '.total.lines.pct' coverage/coverage-summary.json)
          color=$(echo "$coverage < 80" | bc | awk '{if ($1) print "red"; else print "green"}')
          curl -s -X POST "https://pizza-factory.cs329.click/api/badge/${{ secrets.NET_ID }}/jwtpizzaservicecoverage?label=Coverage&value=$coverage%25&color=$color" -H "authorization: bearer ${{ secrets.FACTORY_API_KEY }}"

      - name: Create dist
        run: |
          mkdir dist
          cp Dockerfile dist
          cp -r src/* dist
          cp *.json dist
          sed -i "s/root/${{ secrets.DB_USERNAME }}/g" dist/config.js
          sed -i "s/tempdbpassword/${{ secrets.DB_PASSWORD }}/g" dist/config.js
          sed -i "s/127.0.0.1/${{ secrets.DB_HOSTNAME }}/g" dist/config.js

      - name: Update distribution artifact
        uses: actions/upload-artifact@v4
        with:
          name: package
          path: dist/

  deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    needs: build
    env:
      version: ${{needs.build.outputs.version}}

    steps:
      - name: Download distribution artifact
        uses: actions/download-artifact@v4
        with:
          name: package

      - name: Create OIDC token to AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          audience: sts.amazonaws.com
          aws-region: us-east-1
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT }}:role/${{ secrets.CI_IAM_ROLE }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up machine emulation
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker build
        uses: docker/setup-buildx-action@v3

      - name: Build and push container image
        id: build-image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: "jwt-pizza-service"
        run: |
          docker build --platform=linux/arm64 -t $ECR_REGISTRY/$ECR_REPOSITORY --push .
          echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:latest" >>  $GITHUB_OUTPUT

  grafana-dashboard:
    name: Grafana Dashboard Deploy
    runs-on: ubuntu-latest
    needs: deploy
    if: ${{ secrets.GRAFANA_TERRAFORM_URL != '' && secrets.GRAFANA_TERRAFORM_AUTH != '' }}
    env:
      TF_VAR_grafana_url: ${{ secrets.GRAFANA_TERRAFORM_URL }}
      TF_VAR_grafana_auth: ${{ secrets.GRAFANA_TERRAFORM_AUTH }}
      TF_VAR_prometheus_datasource_uid: ${{ secrets.GRAFANA_PROM_DS_UID || 'grafanacloud-prom' }}
      TF_VAR_metrics_source: ${{ secrets.METRICS_SOURCE || 'jwt-pizza-service-dev' }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform init
        working-directory: terraform/grafana
        run: terraform init

      - name: Terraform validate
        working-directory: terraform/grafana
        run: terraform validate

      - name: Terraform plan
        working-directory: terraform/grafana
        run: terraform plan -out=tfplan

      - name: Terraform apply
        working-directory: terraform/grafana
        run: terraform apply -auto-approve tfplan
